name: gateway-ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: gateway
          POSTGRES_USER: gateway
          POSTGRES_PASSWORD: secret
        ports: ["5432:5432"]
        options: >-
          --health-cmd="pg_isready -U gateway"
          --health-interval=5s --health-timeout=3s --health-retries=10
      redis:
        image: redis:7
        ports: ["6379:6379"]
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s --health-timeout=3s --health-retries=10

    env:
      DB_CONNECTION: pgsql
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_DATABASE: gateway
      DB_USERNAME: gateway
      DB_PASSWORD: secret
      REDIS_HOST: 127.0.0.1
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis

    steps:
      - uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo_pgsql, redis, curl, json, mbstring
          coverage: none

      - name: Composer install
        env:
          COMPOSER_AUTH: '{"github-oauth": {"github.com": "${{ secrets.GITHUB_TOKEN }}"}}'
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: App key
        run: |
          cp .env.example .env || true
          php artisan key:generate --ansi

      # --- gates in order; any red fails the build ---
      - name: Code style (Pint)
        run: vendor/bin/pint --test Corals/modules/Gateway app

      - name: Static analysis (Larastan)
        run: vendor/bin/phpstan analyse --no-progress

      - name: Architecture seam (Deptrac)
        run: vendor/bin/deptrac analyse --config-file=depfile.yaml --no-progress

      - name: Migrate + test (PHPUnit on Postgres)
        run: |
          php artisan migrate --force
          php artisan test --compact

      - name: Dependency audit
        run: composer audit --no-interaction
