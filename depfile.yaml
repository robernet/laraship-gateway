# Deptrac — enforces the strangler seam. Run: vendor/bin/deptrac analyse
# The ruleset lists ALLOWED internal dependencies; anything not listed FAILS the build.
deptrac:
  paths:
    - ./Corals/modules/Gateway
  layers:
    - name: Adapters
      collectors:
        - type: classLike
          value: 'Corals\\Modules\\Gateway\\Adapters\\.*'
    - name: Contracts
      collectors:
        - type: classLike
          value: 'Corals\\Modules\\Gateway\\Contracts\\.*'
    - name: Core
      collectors:
        - type: classLike
          value: 'Corals\\Modules\\Gateway\\Core\\.*'
    - name: Http
      collectors:
        - type: classLike
          value: 'Corals\\Modules\\Gateway\\Http\\.*'
    - name: Models
      collectors:
        - type: classLike
          value: 'Corals\\Modules\\Gateway\\Models\\.*'
  ruleset:
    # THE SEAM: adapters may see ONLY the contract. Not Core, not Models, not Http.
    Adapters:
      - Contracts
    # Presentation orchestrates the application + reads models via Core.
    Http:
      - Core
      - Contracts
      - Models
    # Application owns transactions; depends inward on ports + persistence.
    Core:
      - Contracts
      - Models
    # Ports depend on Core ONLY through Contracts\Drivers\InProcessDriver
    # (GW-404), the Phase-1 transport that bridges DTOs in-process to the
    # already-shipped Core\Collections\* services (docs/adapter-contract.md
    # "Transport"). This does not weaken the seam: the seam's hard rule is
    # "Adapters -> Contracts only" (unchanged, still enforced above) — a
    # driver reaching into Core to actually do the work is the seam
    # fulfilling its purpose, not violating it. Contracts still may not
    # depend on Adapters, Http, or Models.
    Contracts:
      - Core
    # Persistence depends on nothing internal.
    Models: ~
