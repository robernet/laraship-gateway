openapi: 3.1.0
info:
  title: Gateway API
  version: 0.1.0
  description: >
    Issuer API and POS API for the cash-collection payment gateway.
    All money fields are integer centavos (MXN). Every request/response
    carries contract_v: 1. See docs/adapter-contract.md, docs/data-model.md,
    docs/state-machines.md, docs/reference-qr-spec.md for the human contract.
servers:
  - url: /api/v1
    description: Issuer + POS API base path (Sanctum auth, versioned)

security:
  - IssuerAuth: []

tags:
  - name: Issuer
    description: Issuer-facing API — create/track payment intents.
  - name: POS
    description: POS/network-facing API — validate, confirm, batch-confirm collections.

paths:
  /payment-intents:
    post:
      tags: [Issuer]
      summary: Create a payment intent
      operationId: createPaymentIntent
      security:
        - IssuerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaymentIntentCreateRequest'
      responses:
        '201':
          description: Payment intent created (ACTIVE — references generated and signed)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentIntent'
        '422':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /payment-intents/{id}:
    get:
      tags: [Issuer]
      summary: Get payment intent status
      operationId: getPaymentIntent
      security:
        - IssuerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Hashids-encoded public_id
          schema:
            type: string
      responses:
        '200':
          description: Payment intent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentIntent'
        '404':
          $ref: '#/components/responses/NotFound'

  /invoices/{invoice_id}/status:
    get:
      tags: [Issuer]
      summary: Get payment status by issuer invoice_id
      operationId: getInvoiceStatus
      security:
        - IssuerAuth: []
      parameters:
        - name: invoice_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Invoice payment status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentIntent'
        '404':
          $ref: '#/components/responses/NotFound'

  /cash/validate:
    post:
      tags: [POS]
      summary: Validate a collection attempt before confirming (real-time networks only)
      description: >
        Verifies signature/expiry/replay, resolves MID→merchant→intent,
        checks pos_wallet.available >= amount_attempt, and places a reservation.
        Mirrors the adapter⇄core ValidateCollection command 1:1.
      operationId: validateCollection
      security:
        - POSAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ValidateCollectionRequest'
      responses:
        '200':
          description: Validation result (ok=false with decline_reason on decline — not an HTTP error)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidateCollectionResult'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimited'

  /cash/confirm:
    post:
      tags: [POS]
      summary: Confirm a collection (idempotent, finality point)
      description: >
        Idempotent on network_txn_id. Inside one DB transaction: releases the
        reservation, performs the canonical double-entry posting (debit wallet /
        credit issuer + commission + fee), advances state to CONFIRMED, enqueues
        payment.confirmed. Replays return the stored result — never a second posting.
      operationId: confirmCollection
      security:
        - POSAuth: []
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConfirmCollectionRequest'
      responses:
        '200':
          description: Confirm result (ok=false with error on decline — not an HTTP error)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfirmCollectionResult'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimited'

  /cash/batch-confirm:
    post:
      tags: [POS]
      summary: Ingest a settlement batch (SFTP-batch networks)
      description: >
        Fans each row into an idempotent ConfirmCollection with finality_hint=batch
        and no prior reservation. Row-level failures land in
        reconciliation_exceptions and never abort the batch.
      operationId: ingestSettlementBatch
      security:
        - POSAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IngestSettlementBatchRequest'
      responses:
        '200':
          description: Per-row batch result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IngestSettlementBatchResult'
        '401':
          $ref: '#/components/responses/Unauthorized'

webhooks:
  paymentConfirmed:
    post:
      summary: payment.confirmed — fired on the CONFIRMED transition (finality)
      operationId: paymentConfirmedWebhook
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaymentWebhookEnvelope'
      responses:
        '200':
          description: Receiver acknowledges delivery
  paymentCredited:
    post:
      summary: payment.credited — fired per partial confirm on a reusable/variable-partial intent
      operationId: paymentCreditedWebhook
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaymentWebhookEnvelope'
      responses:
        '200':
          description: Receiver acknowledges delivery
  paymentExpired:
    post:
      summary: payment.expired — fired when a payment intent expires with no confirmed payment
      operationId: paymentExpiredWebhook
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaymentWebhookEnvelope'
      responses:
        '200':
          description: Receiver acknowledges delivery
  paymentVoided:
    post:
      summary: payment.voided — fired when a CONFIRMED transaction is voided within the void window
      operationId: paymentVoidedWebhook
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaymentWebhookEnvelope'
      responses:
        '200':
          description: Receiver acknowledges delivery
  settlementCompleted:
    post:
      summary: settlement.completed — fired when an issuer payout (SPEI OUT) reconciles
      operationId: settlementCompletedWebhook
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SettlementWebhookEnvelope'
      responses:
        '200':
          description: Receiver acknowledges delivery

components:
  securitySchemes:
    IssuerAuth:
      type: http
      scheme: bearer
      description: Sanctum personal access token, scoped abilities, short TTL.
    POSAuth:
      type: http
      scheme: bearer
      description: >
        Per-terminal short-TTL signed JWT (mTLS at the transport layer, enforced
        outside this document). See docs/security-antifraud.md.

  parameters:
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      description: Mutating endpoints return the stored response on replay — never a second effect.
      schema:
        type: string

  responses:
    ValidationError:
      description: Request failed validation
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Missing/invalid/over-scope credentials
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Authenticated but not authorized for the requested resource
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    RateLimited:
      description: Rate limit exceeded (validate is enumeration surface — always throttled)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    ContractVersion:
      type: integer
      const: 1

    Money:
      type: integer
      minimum: 0
      description: Integer centavos (MXN). Never a float.

    ErrorResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string
        errors:
          type: object
          additionalProperties:
            type: array
            items:
              type: string

    AmountPolicy:
      type: object
      required: [type]
      properties:
        type:
          type: string
          enum: [fixed, variable]
        amount:
          $ref: '#/components/schemas/Money'
        min:
          $ref: '#/components/schemas/Money'
        max:
          $ref: '#/components/schemas/Money'
        allow_partial:
          type: boolean
          default: false

    PaymentIntentCreateRequest:
      type: object
      required: [invoice_id, mid, mode, amount_policy]
      properties:
        invoice_id:
          type: string
        mid:
          type: string
          pattern: '^[0-9]{9}$'
          description: Routes the intent to a merchant owned by the authenticated issuer (403 if not).
        mode:
          type: string
          enum: [one_time, reusable]
        amount_policy:
          $ref: '#/components/schemas/AmountPolicy'
        mapping_strategy:
          type: string
          enum: [deterministic, stored]
          default: deterministic
        expires_at:
          type: string
          format: date-time
        max_payments:
          type: integer
          nullable: true
        overpay_policy:
          type: string
          enum: [reject, accept, accept_and_flag]
          default: reject
        underpay_policy:
          type: string
          enum: [reject, accept, accept_and_flag]
          default: reject

    PaymentReference:
      type: object
      properties:
        human_reference:
          type: string
          description: 12-digit cashier-typable reference (10-digit token + MOD 97-10 check digits).
        barcode_payload:
          type: string
          description: MID(9) + token(10) + checksum(2), Code128-C.
        qr_payload:
          type: string
          description: Signed JSON/CBOR QR payload — see docs/reference-qr-spec.md.
        kid:
          type: string
        expires_at:
          type: string
          format: date-time
        status:
          type: string

    PaymentIntent:
      type: object
      properties:
        public_id:
          type: string
          description: Hashids-encoded id.
        invoice_id:
          type: string
        mode:
          type: string
          enum: [one_time, reusable]
        amount_policy:
          $ref: '#/components/schemas/AmountPolicy'
        state:
          type: string
          enum: [CREATED, ACTIVE, PAID_PENDING_SETTLEMENT, SETTLED, EXPIRED, CANCELED]
        expires_at:
          type: string
          format: date-time
        max_payments:
          type: integer
          nullable: true
        sandbox:
          type: boolean
          description: True when created by a sandbox-flagged issuer API token (GW-307); not real money movement.
        references:
          type: array
          items:
            $ref: '#/components/schemas/PaymentReference'

    ValidateCollectionRequest:
      type: object
      required: [contract_v, network_id, mid, ref, amount_attempt, store_id, terminal_id, request_id]
      properties:
        contract_v:
          $ref: '#/components/schemas/ContractVersion'
        network_id:
          type: string
        mid:
          type: string
          pattern: '^[0-9]{9}$'
        ref:
          type: string
          pattern: '^[0-9]{10}$'
        amount_attempt:
          $ref: '#/components/schemas/Money'
        store_id:
          type: string
        terminal_id:
          type: string
        request_id:
          type: string

    ValidateCollectionResult:
      type: object
      required: [ok]
      properties:
        ok:
          type: boolean
        intent_state:
          type: string
          enum: [CREATED, ACTIVE, PAID_PENDING_SETTLEMENT, SETTLED, EXPIRED, CANCELED]
        amount_policy:
          $ref: '#/components/schemas/AmountPolicy'
        reservation_id:
          type: string
          nullable: true
        decline_reason:
          type: string
          nullable: true
          enum: [insufficient_funds, expired, tampered, replayed, policy_mismatch, null]

    ConfirmCollectionRequest:
      type: object
      required: [contract_v, network_id, mid, ref, amount_paid, is_partial, network_txn_id, idempotency_key, store_id, terminal_id, collected_at]
      properties:
        contract_v:
          $ref: '#/components/schemas/ContractVersion'
        network_id:
          type: string
        mid:
          type: string
          pattern: '^[0-9]{9}$'
        ref:
          type: string
          pattern: '^[0-9]{10}$'
        amount_paid:
          $ref: '#/components/schemas/Money'
        is_partial:
          type: boolean
        network_txn_id:
          type: string
          description: UNIQUE — drives idempotency/duplicate prevention.
        idempotency_key:
          type: string
        store_id:
          type: string
        terminal_id:
          type: string
        collected_at:
          type: integer
          description: Unix timestamp.

    ConfirmCollectionResult:
      type: object
      required: [ok]
      properties:
        ok:
          type: boolean
        transaction_public_id:
          type: string
          nullable: true
        auth_code:
          type: string
          nullable: true
        receipt:
          type: object
          nullable: true
          properties:
            folio:
              type: string
            amount:
              $ref: '#/components/schemas/Money'
            ts:
              type: integer
        error:
          type: string
          nullable: true

    IngestSettlementBatchRequest:
      type: object
      required: [contract_v, network_id, batch_id, rows]
      properties:
        contract_v:
          $ref: '#/components/schemas/ContractVersion'
        network_id:
          type: string
        batch_id:
          type: string
        rows:
          type: array
          items:
            type: object
            required: [network_txn_id, mid, ref, amount_paid, collected_at]
            properties:
              network_txn_id:
                type: string
              mid:
                type: string
                pattern: '^[0-9]{9}$'
              ref:
                type: string
                pattern: '^[0-9]{10}$'
              amount_paid:
                $ref: '#/components/schemas/Money'
              collected_at:
                type: integer

    IngestSettlementBatchResult:
      type: object
      required: [batch_id, confirmed_count, exception_count]
      properties:
        batch_id:
          type: string
        confirmed_count:
          type: integer
        exception_count:
          type: integer
        exceptions:
          type: array
          items:
            type: object
            properties:
              network_txn_id:
                type: string
              type:
                type: string
                enum: [unmatched_confirm, amount_mismatch, duplicate, orphan_topup, negative_drift]
              reason:
                type: string

    PaymentWebhookEnvelope:
      type: object
      required: [contract_v, event, transaction_public_id, timestamp, nonce, signature]
      properties:
        contract_v:
          $ref: '#/components/schemas/ContractVersion'
        event:
          type: string
          enum: [payment.confirmed, payment.credited, payment.expired, payment.voided]
        payment_intent_public_id:
          type: string
        transaction_public_id:
          type: string
        invoice_id:
          type: string
        amount:
          $ref: '#/components/schemas/Money'
        timestamp:
          type: string
          format: date-time
        nonce:
          type: string
        signature:
          type: string
          description: HMAC signature over the canonical payload (see docs/security-antifraud.md).

    SettlementWebhookEnvelope:
      type: object
      required: [contract_v, event, settlement_public_id, issuer_public_id, timestamp, nonce, signature]
      properties:
        contract_v:
          $ref: '#/components/schemas/ContractVersion'
        event:
          type: string
          const: settlement.completed
        settlement_public_id:
          type: string
        issuer_public_id:
          type: string
        period:
          type: string
        gross:
          $ref: '#/components/schemas/Money'
        commission:
          $ref: '#/components/schemas/Money'
        fee:
          $ref: '#/components/schemas/Money'
        net:
          $ref: '#/components/schemas/Money'
        timestamp:
          type: string
          format: date-time
        nonce:
          type: string
        signature:
          type: string
